<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Social Square</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f8f9fa; color: #343a40; text-align: center; }
        .container { max-width: 400px; padding: 20px; }
        h1 { font-size: 48px; margin-bottom: 10px; }
        p { font-size: 18px; color: #6c757d; }
        button { background-color: #808bf5; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 6px rgba(128, 139, 245, 0.2); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📡</h1>
        <h2>You're Offline</h2>
        <p>It looks like you've lost your connection. Don't worry, Social Square will be back once you're online.</p>
        <button onclick="window.location.reload()">Retry Connection</button>
    </div>
</body>
</html>
